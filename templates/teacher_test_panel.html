<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Test Panel</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body>
<div class="container mt-5">
    <h2>Existing Tests</h2>

    <table class="table table-bordered mt-3">
        <thead>
            <tr>
                <th>Test ID</th>
                <th>Test Name</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
        {% for test in tests %}
        <tr>
            <td>{{ test.test_id }}</td>
            <td>{{ test.test_name }}</td>
            <td>
                <a href="{{ url_for('view_teacher_test_questions', test_id=test.test_id) }}" class="btn btn-info mb-2">
                    View Questions
                </a>

                <!-- 🔥 ADD QUESTION FORM -->
                <form action="/add_question" method="POST" class="mt-2">
                    <input type="hidden" name="test_id" value="{{ test.test_id }}">

                    <input type="text" name="question" class="form-control mb-2"
                           placeholder="Enter Question" required>

                    <textarea name="expected_answer" class="form-control mb-2"
                              placeholder="Enter Expected Answer" required></textarea>

                    <button type="submit" class="btn btn-success btn-sm">
                        Add Question
                    </button>
                </form>

            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>

    <a href="{{ url_for('teacher_home') }}" class="btn btn-primary">
        Back to Teacher Home
    </a>
</div>
</body>
</html>
